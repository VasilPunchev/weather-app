<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.svg" />
</head>
<body>
  <div class="container">
    <h1>Weather App</h1>

    <div class="search-box">
      <input
        type="text"
        id="city-input"
        placeholder="Search for a city..."
        autocomplete="off"
      />
      <button id="search-btn">Search</button>
    </div>

    <button id="location-btn">Use My Location</button>

    <div id="recent-cities" class="recent-cities"></div>
    <button id="clear-cities" class="clear-cities hidden">Clear All</button>

    <p id="loading" class="hidden">Loading weather data...</p>
    <p id="error-message" class="hidden">City not found.</p>

    <div id="weather-card" class="weather-card hidden">
      <h2 id="city-name">City Name</h2>
      <p id="date-time"></p>
      <img id="weather-icon" src="" alt="Weather icon" />
      <p id="description">Description</p>
      <p id="temperature">Temperature: --°C</p>

      <div class="weather-details">
        <p id="humidity">Humidity: --%</p>
        <p id="wind-speed">Wind: -- m/s</p>
        <p id="feels-like">Feels like: --°C</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
